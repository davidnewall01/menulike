<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Name your restaurant — menulike</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8f7f4;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            padding: 2rem 1.5rem;
        }
        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        form { display: flex; flex-direction: column; gap: 1rem; }
        label { font-weight: 600; font-size: 0.875rem; }
        input[type="text"] {
            width: 100%;
            padding: 0.625rem 0.75rem;
            font-size: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            margin-top: 0.25rem;
            display: block;
        }
        input:focus { outline: 2px solid #2563eb; outline-offset: -1px; border-color: transparent; }
        .btn {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: #1a1a1a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #333; }
        .preview {
            background: #f3f4f6;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.8125rem;
            color: #666;
            text-align: center;
            line-height: 1.5;
        }
        .preview-url {
            display: block;
            margin-top: 0.25rem;
            color: #1a1a1a;
            font-weight: 600;
            font-size: 0.875rem;
            word-break: break-all;
        }
        .errors {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: #991b1b;
        }
        .errors ul { list-style: none; }
        .errors li + li { margin-top: 0.25rem; }
    </style>
</head>
<body>
    <div class="card">
        <p class="brand">menulike</p>
        <p class="subtitle">What's your restaurant called?</p>

        {% if errors is defined and errors %}
        <div class="errors">
            <ul>
            {% for e in errors %}
                <li>{{ e }}</li>
            {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form method="post" action="/setup/restaurant">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div>
                <label for="restaurant_name">Restaurant name</label>
                <input type="text" id="restaurant_name" name="restaurant_name" required
                       autocomplete="organization" autofocus
                       placeholder="e.g. Porto Azzurro">
            </div>
            <div class="preview" id="slug-preview">
                Your site will appear at e.g.
                <span class="preview-url"><span id="slug-text">your-restaurant</span>.{{ base_domain }}</span>
            </div>
            <button type="submit" class="btn">Create my site</button>
        </form>
    </div>

    <script>
    /* Client-side slug preview — approximate, labelled "e.g." because
       the server's Python slugify (with unicodedata NFKD accent stripping)
       may differ slightly from this JS version. The server is authoritative. */
    (function() {
        var input = document.getElementById('restaurant_name');
        var slugText = document.getElementById('slug-text');
        input.addEventListener('input', function() {
            var val = input.value.trim().toLowerCase()
                .normalize('NFKD').replace(/[\u0300-\u036f]/g, '')  // strip accents
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
            slugText.textContent = val || 'your-restaurant';
        });
    })();
    </script>
</body>
</html>
