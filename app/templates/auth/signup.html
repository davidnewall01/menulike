<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Sign up — menulike</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #f8f7f4;
            color: #1a1a1a;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .card {
            width: 100%;
            max-width: 400px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 3px rgba(0,0,0,.08);
            padding: 2rem 1.5rem;
        }
        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        form { display: flex; flex-direction: column; gap: 1rem; }
        label { font-weight: 600; font-size: 0.875rem; }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.625rem 0.75rem;
            font-size: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: #fff;
            margin-top: 0.25rem;
            display: block;
        }
        input:focus { outline: 2px solid #2563eb; outline-offset: -1px; border-color: transparent; }
        .btn {
            width: 100%;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: #1a1a1a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #333; }
        .errors {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            color: #991b1b;
        }
        .errors ul { list-style: none; }
        .errors li + li { margin-top: 0.25rem; }
        .errors a { color: #1d4ed8; text-decoration: underline; }
        .login-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #666;
        }
        .login-link a { color: #1d4ed8; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <p class="brand">menulike</p>
        <p class="subtitle">Create your restaurant's website</p>

        {% if errors is defined and errors %}
        <div class="errors">
            <ul>
            {% for e in errors %}
                <li>{{ e }}{% if show_login_link is defined and show_login_link %} <a href="/admin/login">Log in instead</a>{% endif %}</li>
            {% endfor %}
            </ul>
        </div>
        {% endif %}

        <form method="post" action="/signup">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required
                       value="{{ email if email is defined else '' }}"
                       autocomplete="email">
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       minlength="8" placeholder="8+ characters"
                       autocomplete="new-password">
            </div>
            <div>
                <label for="password_confirm">Confirm password</label>
                <input type="password" id="password_confirm" name="password_confirm" required
                       minlength="8"
                       autocomplete="new-password">
            </div>
            <button type="submit" class="btn">Create account</button>
        </form>

        <p class="login-link">Already have an account? <a href="/admin/login">Log in</a></p>
    </div>
</body>
</html>
