<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{{ view.seo.fields.meta_title.value or site.restaurant_name }}</title>
  {% if view.seo.fields.meta_description.value %}
  <meta name="description" content="{{ view.seo.fields.meta_description.value }}">
  {% endif %}
  {% include "public/olive/tokens.html" %}
  <link rel="stylesheet" href="/static/themes/olive/olive.css">
  {% block head %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
  {% include "public/olive/_nav.html" %}
  {% block content %}{% endblock %}
  {% block footer %}{% endblock %}
</body>
</html>
