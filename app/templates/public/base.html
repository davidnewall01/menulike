<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if not request.state.is_custom_domain %}<meta name="robots" content="noindex">{% endif %}
    <link rel="canonical" href="{{ request.state.canonical_base_url }}{{ request.url.path }}">
    <meta property="og:url" content="{{ request.state.canonical_base_url }}{{ request.url.path }}">
    <title>{{ view.seo.fields.meta_title.value or site.restaurant_name }}</title>
    {% if view.seo.fields.meta_description.value %}
    <meta name="description" content="{{ view.seo.fields.meta_description.value }}">
    {% endif %}
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem; }
        h1 { margin-bottom: 0.25rem; }
        .tagline { color: #666; margin-top: 0; }
        .menu { margin-top: 2rem; }
        .menu-name { border-bottom: 2px solid #333; padding-bottom: 0.25rem; }
        .availability { color: #888; font-style: italic; }
        .section { margin-top: 1.5rem; }
        .subsection { margin-top: 1rem; }
        .item { margin: 0.75rem 0; }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; }
        .item-name { font-weight: 600; }
        .item-description { color: #555; font-size: 0.9rem; margin: 0.15rem 0 0; }
        .dietary { font-size: 0.8rem; color: #888; }
        .featured .item-name { color: #b45309; }
        .variants { font-size: 0.9rem; color: #444; }
        .price { white-space: nowrap; }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
