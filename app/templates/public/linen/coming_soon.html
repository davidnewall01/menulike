<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{{ restaurant_name }}</title>
  {% include "public/linen/tokens.html" %}
  <link rel="stylesheet" href="/static/themes/linen/linen.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      color: var(--ink);
      font-family: var(--sans);
    }
    .coming-soon {
      text-align: center;
      padding: 2rem;
    }
    .coming-soon__name {
      font-family: var(--serif);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 500;
      margin: 0 0 0.75rem;
      letter-spacing: 0.02em;
    }
    .coming-soon__sub {
      font-size: 1rem;
      color: var(--ink-3);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="coming-soon">
    <h1 class="coming-soon__name">{{ restaurant_name }}</h1>
    <p class="coming-soon__sub">Opening soon</p>
  </div>
</body>
</html>
