<nav class="nav">
  <div class="nav__in">
    <a class="brand" href="/">
      {% if logo_photo is defined and logo_photo %}

      {% else %}
      <span>{{ site.restaurant_name }}</span>
      {% endif %}
    </a>
    <div class="nav__links">
      <a href="/menu">Eat</a>
      <a href="/menu">Drink</a>
      <a href="#visit">Visit</a>
      <a href="#gallery">Gallery</a>
    </div>
    <button class="burger" aria-label="Menu" onclick="this.classList.toggle('open');this.closest('.nav').querySelector('.mobile-menu').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-menu">
      <a href="/menu">Eat</a>
      <a href="/menu">Drink</a>
      <a href="#visit">Visit</a>
      <a href="#gallery">Gallery</a>
    </div>
