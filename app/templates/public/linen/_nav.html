<nav class="nav">
  <div class="nav__in">
    <a class="brand" href="{{ nav_prefix or '/' }}">
      {% if logo_url %}
      <img src="{{ logo_url }}" alt="{{ site.restaurant_name }}" class="brand__logo">
      {% else %}
      <span>{{ site.restaurant_name }}</span>
      {% endif %}
    </a>
    <div class="nav__links">
      <a href="{{ nav_prefix }}/menu">Eat</a>
      <a href="{{ nav_prefix }}/menu#drinks">Drink</a>
      <a href="{{ nav_prefix }}/our-story">Our Story</a>
      <a href="{{ nav_prefix }}/gallery">Gallery</a>
      <a href="{{ nav_prefix }}/visit">Visit</a>
      {% if site.booking_url %}
      <a href="{{ site.booking_url }}" class="btn btn--light nav__book">Book a Table</a>
      {% endif %}
    </div>
    <button class="burger" aria-label="Menu" onclick="this.classList.toggle('open');this.closest('.nav').querySelector('.mobile-menu').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>
    <div class="mobile-menu">
      <a href="{{ nav_prefix }}/menu">Eat</a>
      <a href="{{ nav_prefix }}/menu#drinks">Drink</a>
      <a href="{{ nav_prefix }}/our-story">Our Story</a>
      <a href="{{ nav_prefix }}/gallery">Gallery</a>
      <a href="{{ nav_prefix }}/visit">Visit</a>
      {% if site.booking_url %}
      <a href="{{ site.booking_url }}" class="btn btn--light">Book a Table</a>
      {% endif %}
    </div>
  </div>
</nav>
