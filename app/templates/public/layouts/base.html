<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{{ site.meta_title or site.restaurant_name }}</title>
  {% if site.meta_description %}
  <meta name="description" content="{{ site.meta_description }}">
  {% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  {% include "public/themes/linen/tokens.html" %}
  <link rel="stylesheet" href="/static/themes/linen/linen.css">
  {% block head %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
  {% include "public/_partials/_nav.html" %}
  {% block content %}{% endblock %}
  {% include "public/_partials/_footer.html" %}
</body>
</html>
