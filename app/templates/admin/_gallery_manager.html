{% if gallery_list %}
<div class="space-y-2">
    {% for item in gallery_list %}
    <div class="flex items-center gap-3 p-2 bg-base-100 rounded-lg border">
        <img src="{{ storage_url(item.photo.s3_key) }}"
             alt="{{ item.photo.alt_text or '' }}"
             class="rounded w-20 h-14 object-cover">
        <span class="text-sm text-base-content/60 flex-1">{{ item.photo.original_filename or "image" }}</span>
        <div class="flex gap-1">
            <button class="btn btn-ghost btn-xs"
                    hx-post="/admin/gallery/move"
                    hx-target="#gallery-images"
                    hx-swap="innerHTML"
                    hx-vals='{"csrf_token": "{{ csrf_token }}", "photo_id": "{{ item.photo_id }}", "direction": "up"}'
                    title="Move up">&uarr;</button>
            <button class="btn btn-ghost btn-xs"
                    hx-post="/admin/gallery/move"
                    hx-target="#gallery-images"
                    hx-swap="innerHTML"
                    hx-vals='{"csrf_token": "{{ csrf_token }}", "photo_id": "{{ item.photo_id }}", "direction": "down"}'
                    title="Move down">&darr;</button>
            <button class="btn btn-outline btn-error btn-xs"
                    hx-post="/admin/gallery/remove"
                    hx-target="#gallery-images"
                    hx-swap="innerHTML"
                    hx-vals='{"csrf_token": "{{ csrf_token }}", "photo_id": "{{ item.photo_id }}"}'
                    hx-confirm="Remove this photo from the gallery?">Remove</button>
        </div>
    </div>
    {% endfor %}
</div>
<div class="mt-3">
    <button class="btn btn-outline btn-sm"
            hx-get="/admin/gallery/picker"
            hx-target="#gallery-images"
            hx-swap="innerHTML">Add photo</button>
</div>
{% else %}
<div class="flex items-center gap-4">
    <div class="rounded-lg w-32 h-24 bg-base-300 flex items-center justify-center text-base-content/30 text-sm border border-dashed">
        None
    </div>
    <button class="btn btn-outline btn-sm"
            hx-get="/admin/gallery/picker"
            hx-target="#gallery-images"
            hx-swap="innerHTML">Add photo</button>
</div>
{% endif %}
