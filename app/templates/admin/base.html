<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    {% if csrf_token is defined and csrf_token %}
    <meta name="csrf-token" content="{{ csrf_token }}">
    {% endif %}
    <title>{% block title %}Admin{% endblock %} — menulike</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
</head>
<body class="min-h-screen bg-base-200">
    <div class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
            <a href="/admin/" class="btn btn-ghost text-xl">menulike</a>
        </div>
        <div class="flex-none">
            <ul class="menu menu-horizontal px-1">
                <li><a href="/admin/">Dashboard</a></li>
                <li><a href="/admin/details">Details</a></li>
                <li><a href="/admin/menu">Menu</a></li>
                <li><a href="/admin/hours">Hours</a></li>
                <li><a href="/admin/photos">Photos</a></li>
                <li><a href="/admin/appearance">Appearance</a></li>
            </ul>
            <form method="post" action="/admin/logout">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="btn btn-ghost btn-sm">Sign out</button>
            </form>
        </div>
    </div>
    <main class="container mx-auto max-w-3xl p-6">
        {% block content %}{% endblock %}
    </main>
    <script>
        document.body.addEventListener("htmx:responseError", function (e) {
            if (e.detail.xhr && e.detail.xhr.status === 403
                && e.detail.xhr.getResponseHeader("X-CSRF-Fail") === "1") {
                window.location.reload();
            }
        });

        /* Collapse/expand — delegated so it survives HTMX swaps */
        document.addEventListener("click", function (e) {
            var toggle = e.target.closest("[data-collapse]");
            if (!toggle) return;
            e.preventDefault();
            var target = document.getElementById(toggle.getAttribute("data-collapse"));
            if (!target) return;
            var isHidden = target.classList.toggle("hidden");
            var chevron = toggle.querySelector(".chevron");
            if (chevron) chevron.textContent = isHidden ? "\u25b8" : "\u25be";
            var summary = toggle.parentElement.querySelector(".collapse-summary");
            if (summary) summary.classList.toggle("hidden", !isHidden);
        });

        function toggleAll(expand) {
            document.querySelectorAll("[data-collapse]").forEach(function (toggle) {
                var target = document.getElementById(toggle.getAttribute("data-collapse"));
                if (!target) return;
                if (expand) target.classList.remove("hidden");
                else target.classList.add("hidden");
                var chevron = toggle.querySelector(".chevron");
                if (chevron) chevron.textContent = expand ? "\u25be" : "\u25b8";
                var summary = toggle.parentElement.querySelector(".collapse-summary");
                if (summary) summary.classList.toggle("hidden", expand);
            });
        }

        /* Drag-to-reorder — Sortable.js, one instance per [data-sortable] container.
           Each container is independent (no shared group = no cross-container drag).
           The handle option confines drag-start to .drag-handle so it never conflicts
           with Edit/Del/Move/chevron. Re-init on htmx:afterSwap (idempotent). */
        function initSortables() {
            document.querySelectorAll("[data-sortable]").forEach(function (el) {
                if (el._sortable) return;
                var url = el.getAttribute("data-reorder-url");
                if (!url) return;
                el._sortable = new Sortable(el, {
                    handle: ".drag-handle",
                    draggable: "[data-id]",
                    animation: 150,
                    ghostClass: "opacity-40",
                    onEnd: function () {
                        var ids = [];
                        el.querySelectorAll(":scope > [data-id]").forEach(function (child) {
                            ids.push(child.getAttribute("data-id"));
                        });
                        var meta = document.querySelector('meta[name="csrf-token"]');
                        if (!meta) return;
                        var body = new URLSearchParams();
                        body.append("csrf_token", meta.content);
                        ids.forEach(function (id) { body.append("ordered_ids", id); });
                        fetch(url, { method: "POST", body: body, credentials: "same-origin" })
                            .then(function (resp) {
                                if (!resp.ok) window.location.reload();
                            });
                    }
                });
            });
        }
        document.addEventListener("DOMContentLoaded", initSortables);
        document.body.addEventListener("htmx:afterSwap", initSortables);
    </script>
</body>
</html>
