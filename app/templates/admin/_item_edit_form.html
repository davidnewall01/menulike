<div id="item-{{ item.menu_item_id }}" class="border border-primary rounded-lg p-3 mb-2 bg-base-200">
    {% if errors %}
    <div class="alert alert-error alert-sm mb-2">
        <ul class="list-disc list-inside text-sm">
            {% for err in errors %}
            <li>{{ err }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
    <form hx-post="/admin/item/{{ item.menu_item_id }}"
          hx-target="#item-{{ item.menu_item_id }}"
          hx-swap="outerHTML">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="_action" value="update">
        <input type="hidden" name="menu_id" value="{{ menu_id }}">
        <div class="grid grid-cols-1 gap-2">
            <div class="form-control">
                <label class="label py-0"><span class="label-text text-xs">Name *</span></label>
                <input type="text" name="name" value="{{ item.name }}" required class="input input-bordered input-sm w-full">
            </div>
            <div class="form-control">
                <label class="label py-0"><span class="label-text text-xs">Description</span></label>
                <input type="text" name="description" value="{{ item.description or '' }}" class="input input-bordered input-sm w-full">
            </div>
            <div class="form-control">
                <label class="label py-0"><span class="label-text text-xs">Dietary tags (comma-separated)</span></label>
                <input type="text" name="dietary_tags" value="{{ item.dietary_tags | join(', ') }}" class="input input-bordered input-sm w-full" placeholder="e.g. vegetarian, gluten-free">
            </div>
            <div class="form-control">
                <label class="label cursor-pointer justify-start gap-2 py-0">
                    <input type="checkbox" name="featured" value="on" {% if item.featured %}checked{% endif %} class="checkbox checkbox-sm">
                    <span class="label-text text-xs">Featured</span>
                </label>
            </div>
        </div>
        <div class="flex gap-2 mt-2">
            <button type="submit" class="btn btn-primary btn-xs">Save</button>
            <button type="button" class="btn btn-outline btn-xs"
                    hx-get="/admin/item/{{ item.menu_item_id }}?menu_id={{ menu_id }}"
                    hx-target="#item-{{ item.menu_item_id }}"
                    hx-swap="outerHTML">Cancel</button>
        </div>
    </form>
</div>
