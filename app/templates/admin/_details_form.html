{% if saved %}
<div class="alert alert-success mb-4">
    <span>Details saved.</span>
</div>
{% endif %}
{% if errors %}
<div class="alert alert-error mb-4">
    <ul class="list-disc list-inside">
        {% for err in errors %}
        <li>{{ err }}</li>
        {% endfor %}
    </ul>
</div>
{% endif %}
<form hx-post="/admin/details" hx-target="#details-form-container" hx-swap="innerHTML">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="card bg-base-100 shadow">
        <div class="card-body space-y-4">

            <h2 class="card-title text-lg">Identity</h2>
            <div class="form-control w-full">
                <label class="label" for="restaurant_name"><span class="label-text">Restaurant name *</span></label>
                <input type="text" id="restaurant_name" name="restaurant_name" value="{{ site.restaurant_name }}" required class="input input-bordered w-full">
            </div>


            <p class="text-sm text-base-content/60 mt-2">Address, phone and email are now edited on the <a href="/admin/visit" class="link">Visit &amp; hours</a> page.</p>
            <div class="card-actions justify-end pt-4">
                <button type="submit" class="btn btn-primary">Save details</button>
            </div>
        </div>
    </div>
</form>
