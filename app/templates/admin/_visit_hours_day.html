<div class="card bg-base-100 shadow-sm p-4">
    <div class="hours-day">
        <h3 class="hours-day__name">{{ day_name }}</h3>
        <div class="hours-day__slots">
            {% if ranges %}
            {% for r in ranges %}
            <div class="hours-range">
                <form class="hours-range__form"
                      hx-post="/admin/hours/{{ r.regular_hours_id }}/update"
                      hx-target="#{{ day_target }}"
                      hx-swap="innerHTML"
                      hx-trigger="change">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <input type="hidden" name="day_of_week" value="{{ day }}">
                    <input type="hidden" name="day_target" value="{{ day_target }}">
                    <input type="hidden" name="location_id" value="{{ loc.location_id }}">
                    <select name="open_time" class="hours-select">
                        {% for h in range(0, 24) %}{% for m in [0, 30] %}
                        {% set tv = "%02d:%02d"|format(h, m) %}
                        {% set hr = h % 12 if h % 12 else 12 %}
                        {% set ap = "AM" if h < 12 else "PM" %}
                        <option value="{{ tv }}" {% if tv == r.open_time.strftime('%H:%M') %}selected{% endif %}>{{ hr }}:{{ "%02d"|format(m) }} {{ ap }}</option>
                        {% endfor %}{% endfor %}
                    </select>
                    <span class="hours-to">to</span>
                    <select name="close_time" class="hours-select">
                        {% for h in range(0, 24) %}{% for m in [0, 30] %}
                        {% set tv = "%02d:%02d"|format(h, m) %}
                        {% set hr = h % 12 if h % 12 else 12 %}
                        {% set ap = "AM" if h < 12 else "PM" %}
                        <option value="{{ tv }}" {% if tv == r.close_time.strftime('%H:%M') %}selected{% endif %}>{{ hr }}:{{ "%02d"|format(m) }} {{ ap }}</option>
                        {% endfor %}{% endfor %}
                    </select>
                    <select name="label" class="hours-select hours-select--label" title="Service (optional)">
                        {% for opt in ["", "breakfast", "lunch", "dinner"] %}
                        <option value="{{ opt }}" {% if (r.label or "") == opt %}selected{% endif %}>{{ opt|capitalize if opt else "No label" }}</option>
                        {% endfor %}
                    </select>
                </form>
                <button class="btn btn-outline btn-error btn-xs"
                        hx-post="/admin/hours/{{ r.regular_hours_id }}/delete"
                        hx-target="#{{ day_target }}"
                        hx-swap="innerHTML"
                        hx-vals='{"csrf_token": "{{ csrf_token }}", "day_of_week": "{{ day }}", "day_target": "{{ day_target }}", "location_id": "{{ loc.location_id }}"}'
                        hx-confirm="Remove this time range?">Remove</button>
            </div>
            {% endfor %}
            {% else %}
            <span class="text-sm text-base-content/40 italic">Closed</span>
            {% endif %}
        </div>
        <form hx-post="/admin/hours/add"
              hx-target="#{{ day_target }}"
              hx-swap="innerHTML">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="day_of_week" value="{{ day }}">
            <input type="hidden" name="day_target" value="{{ day_target }}">
            <input type="hidden" name="location_id" value="{{ loc.location_id }}">
            <input type="hidden" name="open_time" value="09:00">
            <input type="hidden" name="close_time" value="17:00">
            <button type="submit" class="btn btn-outline btn-xs">+ Add</button>
        </form>
    </div>
</div>
