<div id="subsection-header-{{ subsection.subsection_id }}" class="flex justify-between items-start mb-2">
    <div>
        {% if subsection.name %}
        <h4 class="font-semibold text-base-content/80">{{ subsection.name }}</h4>
        {% else %}
        <h4 class="font-semibold text-base-content/40 italic">(no heading)</h4>
        {% endif %}
        {% if subsection.description %}
        <p class="text-base-content/60 text-sm">{{ subsection.description }}</p>
        {% endif %}
    </div>
    <div class="flex gap-1 shrink-0">
        <button class="btn btn-ghost btn-xs"
                hx-get="/admin/subsection/{{ subsection.subsection_id }}/edit?menu_id={{ menu_id }}"
                hx-target="#subsection-header-{{ subsection.subsection_id }}"
                hx-swap="outerHTML">Edit</button>
        <form method="post" action="/admin/subsection/{{ subsection.subsection_id }}" class="inline"
              onsubmit="return confirm('Delete this subsection and all its items?')">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="_action" value="delete">
            <input type="hidden" name="menu_id" value="{{ menu_id }}">
            <button type="submit" class="btn btn-ghost btn-xs text-error">Del</button>
        </form>
    </div>
</div>
