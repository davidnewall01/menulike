<div id="photo-{{ photo.photo_id }}" class="card bg-base-100 shadow">
    <figure class="px-2 pt-2">
        <img src="{{ storage_url(photo.s3_key) }}" alt="{{ photo.alt_text or '' }}"
             class="rounded-lg w-full h-40 object-cover">
    </figure>
    <div class="card-body p-3 pt-2">
        {% if saved is defined and saved %}
        <div class="text-success text-xs mb-1">Alt text saved.</div>
        {% endif %}
        <form hx-post="/admin/photos/{{ photo.photo_id }}/alt"
              hx-target="#photo-{{ photo.photo_id }}"
              hx-swap="outerHTML"
              class="flex flex-col gap-1">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="text" name="alt_text" value="{{ photo.alt_text or '' }}"
                   placeholder="Alt text" class="input input-bordered input-xs w-full">
            <div class="flex justify-between items-center">
                <button type="submit" class="btn btn-outline btn-xs">Save alt</button>
                <button type="button" class="btn btn-outline btn-error btn-xs"
                        hx-post="/admin/photos/{{ photo.photo_id }}/delete"
                        hx-target="#photo-{{ photo.photo_id }}"
                        hx-swap="outerHTML"
                        hx-vals='{"csrf_token": "{{ csrf_token }}"}'
                        hx-confirm="Delete this photo permanently?">Del</button>
            </div>
        </form>
        <div class="text-xs text-base-content/40 mt-1">
            {% if photo.width and photo.height %}{{ photo.width }}×{{ photo.height }} · {% endif %}{{ photo.original_filename or "uploaded" }}
        </div>
    </div>
</div>
