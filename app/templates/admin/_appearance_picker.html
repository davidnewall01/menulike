<div class="space-y-3">
    <div class="flex items-center justify-between">
        <span class="text-sm font-medium">Choose a photo</span>
        <button class="btn btn-ghost btn-xs"
                hx-get="{{ cancel_url }}"
                hx-target="main"
                hx-swap="innerHTML"
                hx-select="main > *"
                hx-push-url="false">Cancel</button>
    </div>
    {% if photos %}
    <div class="grid grid-cols-3 sm:grid-cols-4 gap-2">
        {% for photo in photos %}
        {% if picker_mode is defined and picker_mode == "carousel" %}
        <button class="rounded-lg overflow-hidden border hover:ring-2 hover:ring-primary focus:ring-2 focus:ring-primary transition-all"
                hx-post="{{ add_url }}"
                hx-target="{{ add_target }}"
                hx-swap="innerHTML"
                hx-vals='{"csrf_token": "{{ csrf_token }}", "photo_id": "{{ photo.photo_id }}"}'>
            <img src="{{ storage_url(photo.s3_key) }}"
                 alt="{{ photo.alt_text or '' }}"
                 class="w-full h-20 object-cover">
        </button>
        {% else %}
        <button class="rounded-lg overflow-hidden border hover:ring-2 hover:ring-primary focus:ring-2 focus:ring-primary transition-all"
                hx-post="/admin/appearance/assign"
                hx-target="#slot-{{ role }}"
                hx-swap="innerHTML"
                hx-vals='{"csrf_token": "{{ csrf_token }}", "role": "{{ role }}", "photo_id": "{{ photo.photo_id }}"}'>
            <img src="{{ storage_url(photo.s3_key) }}"
                 alt="{{ photo.alt_text or '' }}"
                 class="w-full h-20 object-cover">
        </button>
        {% endif %}
        {% endfor %}
    </div>
    {% else %}
    <div class="text-sm text-base-content/50">No photos in your library. <a href="/admin/photos" class="link">Upload some first.</a></div>
    {% endif %}
</div>
