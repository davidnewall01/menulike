{% set item_count = section_item_count if section_item_count is defined else 0 %}
<div id="section-header-{{ section.section_id }}" class="flex justify-between items-start mb-3 -mx-6 -mt-4 px-6 py-3 bg-base-200 rounded-t-2xl border-b border-base-300">
    <div class="flex items-center gap-1">
        <span class="drag-handle cursor-grab text-base-content/30 hover:text-base-content/60 select-none" title="Drag to reorder">⠿</span>
        <button type="button" data-collapse="section-body-{{ section.section_id }}" class="btn btn-ghost btn-xs px-1">
            <span class="chevron">▾</span>
        </button>
        <div>
            <h3 class="text-lg font-bold">{{ section.name }}</h3>
            {% if section.description %}
            <p class="text-base-content/60 text-sm">{{ section.description }}</p>
            {% endif %}
        </div>
        <span class="collapse-summary hidden text-base-content/50 text-sm ml-1">· {{ item_count }} dish{{ "es" if item_count != 1 else "" }}</span>
    </div>
    <div class="flex gap-1 shrink-0">
        <button class="btn btn-outline btn-xs"
                hx-get="/admin/section/{{ section.section_id }}/edit?menu_id={{ menu_id }}"
                hx-target="#section-header-{{ section.section_id }}"
                hx-swap="outerHTML">Edit</button>
        <form method="post" action="/admin/section/{{ section.section_id }}" class="inline"
              onsubmit="return confirm('Delete this section and all its contents?')">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="_action" value="delete">
            <input type="hidden" name="menu_id" value="{{ menu_id }}">
            <button type="submit" class="btn btn-outline btn-error btn-xs">Del</button>
        </form>
    </div>
</div>
